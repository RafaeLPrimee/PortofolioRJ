<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN & Certificats — Projet 01</title>
  <link rel="icon" type="image/png" href="RJ-portfolio.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --bg2: #0d1117;
      --surface: #111820;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --transition: .2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 4rem;
      background: rgba(8, 12, 16, .88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -.02em;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
      text-decoration: none;
    }
    .nav-logo span { color: var(--text); }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: color var(--transition);
      position: relative;
      padding-bottom: 2px;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width var(--transition);
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    .nav-links a.active::after,
    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .55rem 1.4rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: transparent;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: background var(--transition), color var(--transition);
      text-decoration: none;
    }
    .nav-cta:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* ─── CONTENU ─── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 4rem 4rem;
      min-height: 100vh;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      transition: gap var(--transition);
    }
    .back-link:hover { gap: 0.8rem; }

    h1 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      letter-spacing: -.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    h2 {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -.01em;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      color: var(--text);
    }

    p {
      font-size: .95rem;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    ul {
      list-style: none;
      margin-bottom: 2rem;
    }

    li {
      font-size: .9rem;
      color: var(--text);
      margin-bottom: 0.8rem;
      padding-left: 1.5rem;
      position: relative;
    }

    li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: bold;
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      main { padding: 80px 1.5rem 2rem; }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Raf<span>ael</span></a>
    <a href="javascript:window.location.href='project-01.html'" class="nav-cta">← Retour</a>
  </nav>

  <main>
    <h1>Installation VPN avec Certificats</h1>
    <p>Configuration d'une infrastructure VPN sécurisée utilisant des certificats SSL/TLS pour l'authentification et le chiffrement des connexions.</p>
    
    <h2>Contenu à venir</h2>
    <p>Cette page sera complétée avec les détails de l'installation du VPN...</p>
  </main>
</body>
</html>
